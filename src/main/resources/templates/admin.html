<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>JustDoIt!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />


</head>

<body>

<div class="container">

    <!-- Left column -->
    <aside class="sidebar">

        <!-- Logo area -->
        <div class="logo">
            <a th:href="@{/}"><img th:src="@{/images/JustDoIt.png}" alt="JustDoIt Logo" width="200" height="200"></a>
        </div>

        <!-- Navigation area -->
        <nav class="navigation">
            <h3>Opciones</h3>
            <ul>
                <li>
                    <a th:href="@{/user/home}">Inicio</a>
                </li>
                <li>
                    <a th:href="@{/user/tasks}">Tareas de usuario actual</a>
                </li>
                <li>
                    <strong>Admin managing</strong>
                </li>
                <li>
                    <form th:action="@{/logout}" method="post" style="display:inline">
                        <button type="submit" class="link-button">Cerrar sesión</button>
                    </form>
                </li>
            </ul>
        </nav>

    </aside>

    <!-- Right column -->
    <main class="content">
        <h1>Area Administrativa</h1>

        <div class="form-container">
            <h2>Crear Usuarios</h2>

            <form method="POST" th:action="@{/admin/createuser}" class="new-user-form" th:object="${newUser}">
                <div class="form-group">
                    <label>Username</label>
                    <input th:field="*{userName}" type="text" placeholder="john_doe" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input th:field="*{password}" type="password" placeholder="john123$SECRET" required>
                </div>

                <div class="form-group">
                    <label>Nombre</label>
                    <input th:field="*{name}" type="text" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>Correo</label>
                    <input th:field="*{email}" type="email" placeholder="john@gmail.com" required>
                </div>

                <div class="form-group">
                    <label>Tipo</label>
                    <select th:field="*{type}" required>
                        <option value="">Seleccione un tipo</option>
                        <option value="REGULAR">REGULAR</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="reset" class="btn-cancel">Cancelar</button>
                    <button type="submit" class="btn-create">Crear</button>
                </div>
            </form>
        </div>


    </main>

</div>

</body>
</html>
